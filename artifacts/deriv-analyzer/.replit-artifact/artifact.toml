kind = "web"
previewPath = "/"
title = "Deriv AI Analyzer"
version = "1.0.0"
id = "artifacts/deriv-analyzer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22984

[services.development]
run = "pnpm --filter @workspace/deriv-analyzer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/deriv-analyzer", "run", "build" ]
publicDir = "artifacts/deriv-analyzer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22984"
BASE_PATH = "/"
